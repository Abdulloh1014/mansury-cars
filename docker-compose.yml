
services:
  mansory-api:
    container_name: mansory-api
    restart: always
    image: node:20.10.0
    ports:
      - 4001:3011
    volumes:
      - ./:/usr/src/mansory
    working_dir: /usr/src/mansory

    networks:
      - monorepo-network

      # FOR PRODUCTION
    command: bash -c "npm install && npm run build && npm run start:prod"

  mansory-batch:
    container_name: mansory-batch
    restart: unless-stopped
    image: node:20.10.0
    ports:
      - 4002:3012
    volumes:
      - ./:/usr/src/mansory
    working_dir: /usr/src/mansory

    networks:
      - monorepo-network

      # FOR PRODUCTION
    command: bash -c "npm install && npm run build && npm run start:prod:batch"  


    
networks:
  monorepo-network:
    driver: bridge

    # mansory-next:  localhost: 4000 <=> container:3000
    # mansory-api:   localhost: 4001 <=> container:3011
    # mansory-batch: localhost: 4002 <=> container:3012